<script>
    let notifications = [];
    let activeNotifIndex = null;

    async function fetchNotifications() {
        try {
            const response = await fetch('https://api.sammyhost.uk/notifications?sites=acgclock&sites=main');
            if (!response.ok) throw new Error('API fetch failed');

            const data = await response.json();

            // Error Check: Ensure data is an array
            if (Array.isArray(data)) {
                notifications = data;
            } else {
                console.error('API did not return an array');
                return;
            }

            // Reset UI on data refresh to prevent index mismatch
            if (activeNotifIndex !== null) {
                removeAllNotifications();
                activeNotifIndex = null;
            }

            checkForNotifs();
        } catch (error) {
            console.error('Error fetching notifications:', error);
        }
    }

    function createNotification(notifType, notifMessage, notifID) {
        const warningBar = document.createElement('div');
        warningBar.className = 'warning-bar';
        warningBar.id = 'warning-bar-' + notifID;

        if (notifType === "warning") {
            warningBar.innerHTML = '⚠️ <strong>Warning:</strong> ' + notifMessage;
        }

        const navbar = document.getElementById('navbar');
        if (navbar) {
            navbar.parentNode.insertBefore(warningBar, navbar.nextSibling);
        } else {
            document.body.prepend(warningBar);
        }
    }

    function removeAllNotifications() {
        const bars = document.getElementsByClassName('warning-bar');
        while(bars[0]) {
            bars[0].parentNode.removeChild(bars[0]);
        }
    }

    function checkForNotifs() {
        if (!notifications.length) return;

        const now = new Date();

        const parseDateTime = (dateStr, timeStr) => {
            const [day, month, year] = dateStr.split('/').map(Number);
            const [hours, minutes] = timeStr.split(':').map(Number);
            return new Date(year, month - 1, day, hours, minutes);
        };

        for (let i = 0; i < notifications.length; i++) {
            const note = notifications[i];
            const start = parseDateTime(note.start_date, note.start_time);
            const end = parseDateTime(note.end_date, note.end_time);

            if (activeNotifIndex === null) {
                if (now >= start && now <= end) {
                    createNotification(note.type, note.message, i);
                    activeNotifIndex = i;
                    break;
                }
            } else if (activeNotifIndex === i) {
                if (!(now >= start && now <= end)) {
                    removeAllNotifications();
                    activeNotifIndex = null;
                    break;
                }
            }
        }
    }

    // Logic to run at the start of every minute
    function startMinuteInterval() {
        checkForNotifs(); // Run once immediately

        const now = new Date();
        const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();

        setTimeout(() => {
            checkForNotifs();
            // Once synced, run every 60 seconds
            setInterval(checkForNotifs, 60000);
        }, msUntilNextMinute);
    }

    // Initial Load
    fetchNotifications();

    // Refresh API data every 2 minutes
    setInterval(fetchNotifications, 120000);

    // Start the minute-synced checker
    startMinuteInterval();
</script>

<!-- CLOCK LOGIC -->
<script>
    (function() {
        let todaysSchedule = [];
        let lastFetchDate = ""; // Stores the date string (e.g., "Thursday, April 30, 2026")
        let soundEnabled = false;
        let lastBellTime = 0;
        let isFetching = false;

        const bell30s = new Audio('../media/sounds/bells/454609__richcraftstudios__richcraft-chime-d-20181219.wav');
        const bellEnd = new Audio('../media/sounds/bells/454612__richcraftstudios__richcraft-chime-d6ish-20181219.wav');

        async function fetchTimetable() {
            if (isFetching) return;
            isFetching = true;

            try {
                const response = await fetch('https://api.sammyhost.uk/timetable-for-date');
                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // Sort and update state
                todaysSchedule = data.sort((a, b) => a.start_time - b.start_time);
                lastFetchDate = new Date().toDateString();
                isFetching = false;
                console.log("Schedule updated for:", lastFetchDate);
            } catch (error) {
                console.error('Fetch failed, retrying in 10s...', error);
                isFetching = false;
                // Retry logic for Wi-Fi wake-up lag
                setTimeout(fetchTimetable, 10000);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            if (soundEnabled) bell30s.play();
        }

        document.addEventListener('keydown', (e) => { if (e.key === "m") toggleSound(); });

        function formatTimeRemaining(ms) {
            const s = Math.floor(ms / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return h > 0 ? `${h}h ${m}m ${sec}s` : m > 0 ? `${m}m ${sec}s` : `${sec}s`;
        }

        function updateClock() {
            const now = new Date();
            const nowSec = now.getTime() / 1000;
            const currentDateString = now.toDateString();

            // 1. SMART WAKE CHECK: If the day changed while the TV was asleep, reset and fetch
            if (lastFetchDate !== "" && lastFetchDate !== currentDateString) {
                todaysSchedule = []; // Clear yesterday's data
                fetchTimetable();
            }

            document.getElementById('main-date').textContent = now.toLocaleDateString('en-GB', { weekday: "long", month: "long", day: "numeric" });
            document.getElementById('main-clock').textContent = now.toLocaleTimeString('en-GB', { hour12: false });

            const statusEl = document.getElementById('status-message');
            const subStatusEl = document.getElementById('sub-status');
            const progressBar = document.getElementById('time-progress');

            // Handle loading state
            if (todaysSchedule.length === 0) {
                statusEl.textContent = "Updating Schedule...";
                subStatusEl.textContent = "Please wait for sync...";
                progressBar.style.width = "0%";
                return;
            }

            const currentEvent = todaysSchedule.find(s => nowSec >= s.start_time && nowSec < s.end_time);
            const nextEvent = todaysSchedule.find(s => s.start_time > nowSec);

            if (currentEvent) {
                statusEl.textContent = currentEvent.name;
                const msRemaining = (currentEvent.end_time - nowSec) * 1000;

                if (currentEvent.all_day) {
                    progressBar.style.width = "0%";
                } else {
                    const totalMs = (currentEvent.end_time - currentEvent.start_time) * 1000;
                    const percent = 100 - ((msRemaining / totalMs) * 100);
                    progressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
                }

                // Bell Logic
                if (soundEnabled && (Date.now() - lastBellTime > 1500)) {
                    if (msRemaining > 29000 && msRemaining <= 30000) {
                        bell30s.play(); lastBellTime = Date.now();
                    } else if (msRemaining > 0 && msRemaining <= 1000) {
                        bellEnd.play(); lastBellTime = Date.now();
                    }
                }

                const nextText = nextEvent ? `Next: ${nextEvent.name}` : "End of Schedule";
                subStatusEl.textContent = `${formatTimeRemaining(msRemaining)} remaining · ${nextText}`;
            } else {
                statusEl.textContent = "No currently scheduled events";
                progressBar.style.width = "0%";
                subStatusEl.textContent = nextEvent
                    ? `Next: ${nextEvent.name} (starts in ${formatTimeRemaining((nextEvent.start_time - nowSec) * 1000)})`
                    : "Schedule Finished";
            }
        }

        function syncClock() {
            updateClock();
            setTimeout(syncClock, 1000 - (Date.now() % 1000));
        }

        // Initial load
        fetchTimetable().then(syncClock);

        // Background refresh every 30 minutes
        setInterval(fetchTimetable, 1800000);
    })();
</script>

<!-- RELOAD PAGE ON HASH UPDATE -->
<script>
    // Store the hash found when the page first loads
    let initialHash = null;

    async function checkForUpdates() {
        try {
            // 'no-store' ensures we get the latest file from the server, not the cache
            const response = await fetch('../hash.txt?t=' + Date.now(), { cache: 'no-store' });
            const latestHash = (await response.text()).trim();

            if (!initialHash) {
                // Set the baseline on the first run
                initialHash = latestHash;
            } else if (latestHash !== initialHash) {
                // If the hash changed, refresh the page
                console.log('New version detected. Reloading...');
                window.location.reload();
            }
        } catch (error) {
            console.error('Failed to check for updates:', error);
        }
    }

    // Check immediately on load, then every 60 seconds
    checkForUpdates();
    setInterval(checkForUpdates, 60000);
</script>
