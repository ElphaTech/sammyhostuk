<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SammyHost.uk</title>
        <link rel="stylesheet" href="/style.css" />
        <link rel="icon" type="image/x-icon" href="/media/images/sh.logo-whiteonblack.png">
    </head>
    <body>
        <header class="navbar" id="navbar">
            <a href="/" class="logo">sammyhost<span class="dot">.</span>uk</a>
            <nav class="nav-links">
                <a href="https://copyparty.sammyhost.uk/">Copyparty</a>
            </nav>
        </header>

        <main id="content">
            <div class="ping-container">
    <div id="ping-header" onclick="measurePing()">Current ping (click to re-ping):</div>
    <div id="ping-time" onclick="measurePing()">0ms</div>
</div>

<script>
    async function measurePing() {
        const header = document.getElementById('ping-header');
        const display = document.getElementById('ping-time');
        const start = performance.now();

        try {
            await fetch('https://api.sammyhost.uk/ping');
            const end = performance.now();
            const duration = (end - start).toFixed(2);

            header.innerText = "Last ping:"
            display.innerText = `${duration} ms`;
        } catch (error) {
            header.innerText = "Error: Could not reach server";
            display.innerText = "-1ms";
            console.error(error);
        }
    }
</script>

<style>
.ping-container {
    height: 100vh; /* Occupy most of the screen */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #F5F5F5;
    position: relative;
    padding: 0 5%;
}

    #ping-header{
        font-family: 'Unbounded', sans-serif;
        font-weight: 400;
        font-size: clamp(1.5rem, 4vw, 3rem);
        margin-bottom: 1rem;
        opacity: 0.9;
    }

    /* Big Clock Font */
    #ping-time {
        font-family: 'Unbounded', sans-serif;
        font-weight: 700;
        font-size: clamp(3rem, 15vw, 10rem); /* Responsive scaling for TVs */
        line-height: 1.1;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }
</style>

        </main>

        <footer class="site-footer">
            <div class="footer-content">
                <div class="footer-left">
                    <img src="/media/images/sh.logo-whiteonblue.png" alt="SammyHost Logo" class="footer-logo">
                </div>
                <div class="footer-right">
                    <p>&copy; 2025 SammyHost. All rights reserved.</p>
                    <nav class="footer-nav">
                        <a href="/404/">About</a>
                        <a href="/404/">Contact</a>
                        <a href="/404/">Terms</a>
                    </nav>
                    <p class="footer-email">
                    Contact us: <a href="mailto:admin@sammyhost.uk">admin@sammyhost.uk</a></br>
                    Version: 78e7d58
                    </p>
                </div>
            </div>
        </footer>
    </body>
</html>
